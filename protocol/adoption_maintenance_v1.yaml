# adoption_maintenance v1 — protocol extension (extends lifecycle detection/extraction)

project: adoption-is-not-maintenance
extends: protocol/lifecycle_v1.yaml

research_question: >
  To what extent does the presence of AI-assisted development convention files
  in open-source repositories reflect active maintenance of those conventions?

core_claim: >
  Presence (adoption) and git-based maintenance are distinct quantities;
  the adoption–maintenance gap is large and heterogeneous.

unit_of_analysis:
  primary: artifact_instance
  secondary: repository
  tertiary: artifact_type
  quaternary: introduction_cohort

observation_end: last_commit_timestamp_at_extraction  # per repo, from lifecycle extraction

maintenance_windows_days:
  primary: 180
  sensitivity:
    - 90
    - 365

# --- Adoption (presence) ---

adoption:
  artifact_adopted:
    definition: Artifact path exists in git HEAD at observation_end.
    operational: present_in_head == true
  repo_adopted:
    definition: Repository has at least one AI convention file in HEAD.
    operational: count(artifacts where present_in_head) >= 1 per repo_id

# --- Maintenance (git activity) ---

maintenance:
  artifact_maintained_T:
    definition: >
      Adopted artifact received at least one git touch within the last T days
      before observation_end.
    operational: >
      present_in_head == true
      AND days_since_last_touch < T
    note: >
      days_since_last_touch = (observation_end - last_touch_at).days
  repo_maintained_T:
    definition: Repository has at least one maintained AI convention file.
    operational: count(artifacts where artifact_maintained_T) >= 1 per repo_id

# --- Maturity (denominator guard) ---

maturity:
  artifact_mature_T:
    definition: Artifact has existed long enough to evaluate T-day maintenance.
    operational: follow_up_days >= T
    alias: eligible_T  # same as lifecycle eligibility
  artifact_mature_present_T:
    definition: Present artifact with sufficient follow-up to classify dormant vs active.
    operational: present_in_head == true AND follow_up_days >= T

# --- State machine (mutually exclusive at threshold T) ---

states:
  DELETED:
    operational: present_in_head == false
    note: Includes paths removed from HEAD; ever introduced if in corpus.
  TOO_YOUNG:
    operational: present_in_head == true AND follow_up_days < T
    alias: CENSORED
    note: Excluded from mature-present gap denominators.
  ACTIVE:
    operational: present_in_head == true AND follow_up_days >= T AND days_since_last_touch < T
  DORMANT:
    operational: present_in_head == true AND follow_up_days >= T AND days_since_last_touch >= T
    note: Git-dormant; not synonymous with semantic obsolescence.

state_priority: [DELETED, TOO_YOUNG, ACTIVE, DORMANT]  # assign in order

# --- Adoption–Maintenance Gap ---

gap:
  artifact_level:
    gap_count_mature_T:
      formula: count(state == DORMANT at T)
    gap_rate_mature_T:
      formula: count(DORMANT) / count(mature_present at T)
      denominator: artifact_mature_present_T
    adoption_without_maintenance_mature_T:
      formula: same as gap_rate_mature_T
    complementary:
      maintenance_rate_mature_present_T:
        formula: count(ACTIVE) / count(mature_present at T)
  repo_level:
    repo_adopted:
      formula: repo has >=1 present_in_head
    repo_maintained_T:
      formula: repo has >=1 artifact_maintained_T
    repo_dormant_only_T:
      formula: >
        repo adopted AND no artifact_maintained_T
        AND >=1 mature_present DORMANT at T
    gap_rate_repos_T:
      formula: (adopted repos - maintained repos) / adopted repos
      alt_formula: repos where repo_dormant_only_T / adopted repos
  by_artifact_type:
    report: [n_total, n_present, n_mature_present_T, n_active_T, n_dormant_T, gap_rate_mature_T]
    min_mature_present_T: 30
  by_introduction_cohort:
    cohort_field: introduced_at_quarter  # YYYY-Q
    report: same as by_artifact_type per cohort

# --- Research questions ---

research_questions:
  RQ1_prevalence: >
    What fraction of AI convention artifacts and repositories are adopted (present in HEAD)
    but not actively maintained at 90/180/365 days?
  RQ2_gap_magnitude: >
    How large is the adoption–maintenance gap at artifact and repository level?
  RQ3_heterogeneity_type: >
    Does the gap differ by artifact family (prompts vs governance paths)?
  RQ4_heterogeneity_cohort: >
    Does the gap differ by introduction cohort (2024-Q1 … 2026-Q1)?
  RQ5_deleted_vs_dormant: >
    Among ever-introduced artifacts, what is the split between DELETED and DORMANT
    vs ACTIVE at primary threshold?

# --- Analysis (no Cox, no causal) ---

analysis:
  primary_threshold_days: 180
  bootstrap:
    method: cluster_bootstrap_by_repo_id
    n_replicates: 5000
    seed: 42
    metrics:
      - gap_rate_mature_180
      - maintenance_rate_mature_present_180
      - repo_gap_rate_180
  leave_one_repo_out:
    metrics:
      - gap_rate_mature_180
      - maintenance_rate_mature_present_180
  forbidden:
    - cox_regression
    - causal_language
    - semantic_obsolescence_claims_without_manual_validation

# --- Outputs ---

outputs:
  artifact_states: data/lifecycle/artifact_states.parquet
  metrics: results/lifecycle/adoption_maintenance.json
  table_gap_by_type: results/lifecycle/table_gap_by_type.csv
  table_gap_by_cohort: results/lifecycle/table_gap_by_cohort.csv
  table_repo_summary: results/lifecycle/table_repo_summary.csv
  funnel: results/lifecycle/funnel_adoption_maintenance.csv
